<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Luân: Siêu Tốc Rượt Đuổi</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        canvas { display: block; background: radial-gradient(circle at center, #111, #000); }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 22px; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px #fff, 0 0 20px #fff; z-index: 10;}
        #highScore { position: absolute; top: 50px; width: 100%; text-align: center; font-size: 16px; color: #aaa; z-index: 10;}
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
                    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(5px);}
        #title { font-size: 36px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
                 background: linear-gradient(to right, #00d2ff, #fff, #ff4757); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: titleGlow 1.5s ease-in-out infinite alternate;}
        #finalScore { font-size: 28px; color: #d4af37; margin-bottom: 30px; display: none;}
        .btn { background: #fff; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; font-size: 18px; box-shadow: 0 0 15px #fff; transition: transform 0.1s;}
        .btn:active { transform: scale(0.95); }

        @keyframes titleGlow { from { text-shadow: 0 0 10px #fff, 0 0 20px #00d2ff, 0 0 30px #00d2ff; } to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4757, 0 0 40px #ff4757; } }
    </style>
</head>
<body>
    <div id="ui">Điểm: <span id="score">0</span></div>
    <div id="highScore">Kỷ lục: <span id="bestScore">0</span></div>
    
    <div id="overlay">
        <div id="title">SIÊU TỐC RƯỢT ĐUỔI</div>
        <div id="finalScore">Bạn đã né được: <span id="endScore">0</span> giây</div>
        <button id="startBtn" class="btn">Bắt đầu</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const bestScoreElement = document.getElementById("bestScore");
        const overlay = document.getElementById("overlay");
        const titleElement = document.getElementById("title");
        const finalScoreElement = document.getElementById("finalScore");
        const endScoreElement = document.getElementById("endScore");
        const startBtn = document.getElementById("startBtn");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let highScore = localStorage.getItem("ruotduoi_highscore") || 0;
        bestScoreElement.innerText = highScore;
        
        let gameActive = false;
        let isFirstTime = true;
        let particles = [];
        let combo = 1;

        let player = { x: canvas.width/2, y: canvas.height/2, size: 22, color: "#00d2ff", glow: "#fff", comboActive: false };
        let enemy = { x: -100, y: -100, size: 28, color: "#ff4757", glow: "#ff4757", speed: 2.2 };

        // Điều khiển cảm ứng
        window.addEventListener("touchmove", (e) => {
            if(!gameActive) return;
            let touch = e.touches[0];
            player.x = touch.clientX;
            player.y = touch.clientY;
            
            // Giới hạn người chơi trong màn hình
            if (player.x < player.size) player.x = player.size;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
            if (player.y < player.size) player.y = player.size;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;
        });

        // Hạt ánh sáng nổ
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.friction = 0.96; this.gravity = 0.1; this.alpha = 1; this.decay = Math.random() * 0.02 + 0.01;
            }
            update() { this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed + this.gravity; this.speed *= this.friction; this.alpha -= this.decay; }
            draw() { if (this.alpha <= 0) return; ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        function resetGame() {
            score = 0; combo = 1;
            player.x = canvas.width/2; player.y = canvas.height/2;
            enemy.speed = 2.2;
            enemy.x = Math.random() < 0.5 ? -50 : canvas.width + 50;
            enemy.y = Math.random() * canvas.height;
            particles = [];
            finalScoreElement.style.display = "none";
            titleElement.innerText = "SIÊU TỐC RƯỢT ĐUỔI";
            startBtn.innerText = "Chơi lại";
        }

        function startGame() {
            gameActive = true;
            overlay.style.display = "none";
            if (isFirstTime) isFirstTime = false;
            else resetGame();
        }

        function endGame() {
            gameActive = false;
            createExplosion(enemy.x, enemy.y, enemy.color);
            createExplosion(player.x, player.y, player.color);
            if (window.navigator.vibrate) window.navigator.vibrate(200); // Rung điện thoại
            
            let finalS = Math.floor(score/10);
            endScoreElement.innerText = finalS;
            finalScoreElement.style.display = "block";
            titleElement.innerText = "GAME OVER";
            startBtn.innerText = "Chơi lại";
            overlay.style.display = "flex";

            if (finalS > highScore) {
                highScore = finalS;
                localStorage.setItem("ruotduoi_highscore", highScore);
                bestScoreElement.innerText = highScore;
                titleElement.innerText = "KỶ LỤC MỚI!";
                titleElement.style.color = "#d4af37";
            } else {
                titleElement.style.color = "";
            }
        }

        function createExplosion(x, y, color) { for(let i=0; i<30; i++) particles.push(new Particle(x, y, color)); }

        startBtn.addEventListener("click", startGame);

        function update() {
            if (!gameActive) return;

            // Địch đuổi
            let dx = player.x - enemy.x; let dy = player.y - enemy.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > 0) {
                enemy.x += (dx / distance) * enemy.speed;
                enemy.y += (dy / distance) * enemy.speed;
            }

            // Tăng tốc độ & combo
            enemy.speed += 0.001;
            score += combo;
            scoreElement.innerText = Math.floor(score/10);

            // Kiểm tra va chạm (Thua cuộc)
            if (distance < player.size/2 + enemy.size/2 + 5) { endGame(); }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ hạt
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); });

            if(gameActive) {
                // Vẽ người chơi Neon
                ctx.shadowBlur = 15; ctx.shadowColor = player.glow; ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - player.size);
                ctx.lineTo(player.x - player.size, player.y + player.size/2);
                ctx.lineTo(player.x + player.size, player.y + player.size/2);
                ctx.closePath(); ctx.fill();

                // Thêm chữ GL vào người chơi
                ctx.fillStyle = "#000"; ctx.shadowBlur = 0; ctx.font = "bold 14px sans-serif";
                ctx.fillText("GL", player.x - 9, player.y + player.size/2 - 3);

                // Vẽ kẻ địch Neon
                ctx.shadowBlur = 20; ctx.shadowColor = enemy.glow; ctx.fillStyle = enemy.color;
                ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.size/2, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow
            }
            
            update();
            requestAnimationFrame(draw);
        }

        resetGame();
        draw();
    </script>
</body>
</html>
