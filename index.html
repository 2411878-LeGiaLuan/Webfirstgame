<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Luân: Chiến Binh Không Gian</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; background: radial-gradient(circle at center, #1a1a2e, #000); }
        #ui { position: absolute; top: 15px; left: 15px; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #ff4757; z-index: 10; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); 
                    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; text-align: center; }
        .msg { font-size: 32px; color: #ff4757; margin-bottom: 20px; font-weight: bold; }
        .score-final { font-size: 24px; color: #ffd700; margin-bottom: 30px; }
        .btn { background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; font-size: 18px; box-shadow: 0 0 20px #ffd700; }
    </style>
</head>
<body>
    <div id="ui">ĐIỂM: <span id="score">0</span> | CẤP: <span id="level">1</span></div>
    
    <div id="overlay">
        <div id="status" class="msg">SẴN SÀNG CHƯA?</div>
        <div id="finalScore" class="score-final"></div>
        <button id="actionBtn" class="btn">BẮT ĐẦU</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("level");
        const overlay = document.getElementById("overlay");
        const statusEl = document.getElementById("status");
        const finalScoreEl = document.getElementById("finalScore");
        const actionBtn = document.getElementById("actionBtn");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let level = 1;
        let bullets = [];
        let enemies = [];
        let particles = [];
        let boss = null;
        let enemyDirection = 1;
        let enemySpeed = 1.5;

        const player = { x: canvas.width / 2, y: canvas.height - 100, w: 50, h: 50 };

        // Cảm ứng iPhone
        window.addEventListener("touchmove", (e) => {
            if (!gameActive) return;
            player.x = e.touches[0].clientX - player.w / 2;
        });

        function createEnemies() {
            enemies = [];
            let rows = 3 + level;
            let cols = Math.floor(canvas.width / 60);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({ x: 30 + c * 55, y: 60 + r * 50, w: 35, h: 35, alive: true, hp: 1 });
                }
            }
        }

        function createBoss() {
            boss = { x: canvas.width / 2 - 60, y: -150, w: 120, h: 120, hp: 50 * level, maxHp: 50 * level, alive: true };
        }

        function spawnParticle(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, alpha: 1, color });
            }
        }

        function shoot() {
            if (!gameActive) return;
            bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 5, h: 15 });
            setTimeout(shoot, 250 - (level * 10));
        }

        function update() {
            if (!gameActive) return;

            bullets.forEach((b, i) => {
                b.y -= 10;
                if (b.y < 0) bullets.splice(i, 1);
            });

            let edge = false;
            enemies.forEach(e => {
                if (!e.alive) return;
                e.x += enemySpeed * enemyDirection;
                if (e.x <= 0 || e.x >= canvas.width - e.w) edge = true;
                if (e.y >= player.y) endGame(false);
            });

            if (edge) {
                enemyDirection *= -1;
                enemies.forEach(e => e.y += 20);
            }

            // Boss logic
            if (boss && boss.alive) {
                if (boss.y < 80) boss.y += 2;
                boss.x += (enemySpeed + 1) * enemyDirection;
                if (boss.x <= 0 || boss.x >= canvas.width - boss.w) enemyDirection *= -1;
            }

            // Va chạm
            bullets.forEach((b, bi) => {
                enemies.forEach(e => {
                    if (e.alive && b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        e.alive = false;
                        bullets.splice(bi, 1);
                        score += 10;
                        spawnParticle(e.x + e.w/2, e.y + e.h/2, "#ffd700");
                    }
                });

                if (boss && boss.alive && b.x < boss.x + boss.w && b.x + b.w > boss.x && b.y < boss.y + boss.h && b.y + b.h > boss.y) {
                    boss.hp -= 2;
                    bullets.splice(bi, 1);
                    if (boss.hp <= 0) {
                        boss.alive = false;
                        score += 500;
                        nextLevel();
                    }
                }
            });

            if (enemies.every(e => !e.alive) && !boss) createBoss();
            
            scoreEl.innerText = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ đạn laze
            ctx.fillStyle = "#00d2ff";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Vẽ Gà con
            ctx.font = "30px Arial";
            enemies.forEach(e => { if (e.alive) ctx.fillText("🐔", e.x, e.y + 25); });

            // Vẽ Boss Gà
            if (boss && boss.alive) {
                ctx.font = "100px Arial";
                ctx.fillText("🐓", boss.x, boss.y + 80);
                ctx.fillStyle = "red";
                ctx.fillRect(boss.x, boss.y - 10, boss.w * (boss.hp / boss.maxHp), 10);
            }

            // Vẽ Phi thuyền Gia Luân
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.moveTo(player.x + player.w/2, player.y);
            ctx.lineTo(player.x, player.y + player.h);
            ctx.lineTo(player.x + player.w, player.y + player.h);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.font = "bold 14px Arial";
            ctx.fillText("GL", player.x + 15, player.y + 40);

            // Hạt nổ
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
                if (p.alpha <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            update();
            requestAnimationFrame(draw);
        }

        function nextLevel() {
            level++;
            levelEl.innerText = level;
            enemySpeed += 0.5;
            createEnemies();
        }

        function endGame(win) {
            gameActive = false;
            overlay.style.display = "flex";
            statusEl.innerText = win ? "CHIẾN THẮNG!" : "BẠN ĐÃ THUA!";
            finalScoreEl.innerText = "TỔNG ĐIỂM: " + score;
        }

        actionBtn.onclick = () => {
            score = 0; level = 1;
            levelEl.innerText = level;
            createEnemies();
            boss = null;
            gameActive = true;
            overlay.style.display = "none";
            shoot();
        };

        draw();
    </script>
</body>
</html>
